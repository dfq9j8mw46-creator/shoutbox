name = "shoutbox"
main = "src/index.js"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[vars]
BASE_URL = "https://sb.rooty.org"

[[routes]]
pattern = "sb.rooty.org"
custom_domain = true

# KV namespace for sessions and magic tokens
[[kv_namespaces]]
binding = "KV"
id = "64646894967d4cfc8c9df02392a35cc7"

# Set these secrets with: wrangler secret put <NAME>
# SECRET           - HMAC signing key
# EMAIL_API_KEY    - API key for your email provider (e.g. Resend)
# EMAIL_FROM       - Sender address (e.g. chat@yourdomain.com)

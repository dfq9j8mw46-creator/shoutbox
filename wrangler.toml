name = "shoutbox"
main = "src/index.js"
compatibility_date = "2024-12-01"

[durable_objects]
bindings = [
  { name = "CHAT_ROOM", class_name = "ChatRoom" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom"]

[vars]
BASE_URL = "https://sb.rooty.org"

# Privacy: disable Workers Logs / observability so per-request trace data
# (including client IPs in the request envelope) is not retained.
[observability]
enabled = false
head_sampling_rate = 0

[[routes]]
pattern = "sb.rooty.org"
custom_domain = true

# KV namespace for sessions, passkey credentials, and QR pairing tokens
[[kv_namespaces]]
binding = "KV"
id = "64646894967d4cfc8c9df02392a35cc7"

# Set this secret with: wrangler secret put SECRET
# SECRET - HMAC signing key (used for session fingerprints, KV key hashing,
#          rate-limit IP hashing, and QR pairing token hashing)

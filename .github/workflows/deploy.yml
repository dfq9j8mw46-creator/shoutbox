name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Stamp version.json
        run: |
          cat > src/version.json <<EOF
          {
            "commit": "${{ github.sha }}",
            "workflow_run": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "built_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF
          cat src/version.json

      - name: Build bundle (dry-run)
        run: npx wrangler deploy --dry-run --outdir=dist

      - name: Compute bundle hash
        id: hash
        run: |
          BUNDLE=$(ls dist/*.js | head -1)
          HASH=$(sha256sum "$BUNDLE" | awk '{print $1}')
          echo "bundle=$BUNDLE" >> $GITHUB_OUTPUT
          echo "sha256=$HASH" >> $GITHUB_OUTPUT
          echo "Bundle: $BUNDLE"
          echo "SHA256: $HASH"

      - name: Attest bundle provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.hash.outputs.bundle }}

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Verify live bundle matches attested build
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ATTESTED_HASH: ${{ steps.hash.outputs.sha256 }}
        run: node .github/scripts/verify-live.mjs

      - name: Attest live-deployed bundle
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/live-script.js

      - name: Publish release with bundle
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="build-${GITHUB_SHA::12}"
          NOTES=$(cat <<EOF
          Automated build of commit \`${{ github.sha }}\`.

          - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          - Bundle SHA256: \`${{ steps.hash.outputs.sha256 }}\`

          **Verify provenance:**
          \`\`\`
          gh attestation verify $(basename ${{ steps.hash.outputs.bundle }}) \\
            --owner ${{ github.repository_owner }}
          \`\`\`
          EOF
          )
          gh release create "$TAG" "${{ steps.hash.outputs.bundle }}" dist/live-script.js \
            --title "Build $TAG" \
            --notes "$NOTES"
